    /* =========================
       VÍDEO - SEM QUADRADO BRANCO / SEM CARD
       ========================= */
    .video-wrapper{
      width:100%;
      display:flex;
      justify-content:center;
      padding: 0 14px; /* só respiro lateral no mobile */
    }

    /* “tamanho de celular” no desktop, mas sem caixa branca */
    .video-container{
  width: min(420px, 100%);
  background: #d8dada;      /* fundo cinza suave */
  padding: 10px;            /* cria o “respiro” ao redor do vídeo */
  border-radius: 16px;      /* cantos arredondados */
}
      /* sem fundo, sem borda, sem sombra, sem padding */
    .video-container vturb-smartplayer{
  display:block;
  border-radius: 12px;
  overflow:hidden;
}

    /* O embed da VTurb deve preencher a largura */
    .video-container iframe,
    .video-container video{
      width:100% !important;
      height:auto !important;
      border:0 !important;
      display:block;
    }

    /* =========================
       CTA (APARECE COM DELAY)
       ========================= */
    .cta-area{
      text-align:center;
      padding: 20px 14px 0;
    }

    .cta-button{
      display:block;
      width: min(520px, 100%);
      margin: 0 auto;
      padding: 14px 16px;
      background: var(--btn);
      color:#fff;
      text-decoration:none;
      font-weight:800;
      border-radius:10px;
      border:2px solid rgba(0,0,0,.15);
      transition: .2s;
    }
    .cta-button:hover{ background: var(--btnHover); }

    .cta-no{
      display:inline-block;
      margin-top:12px;
      font-size:14px;
      text-decoration:underline;
      color:#000;
    }

    /* =========================
       ESCONDER CTA INICIALMENTE
       ========================= */
    .esconder{ display:block; }

    /* =========================
       MOBILE
       ========================= */
    @media (max-width:420px){
      :root{ --barH: 54px; }
      .top-bar{ font-size:13px; }
      .video-wrapper{ padding:0 10px; }
    }

  <!-- =========================
       SCRIPT DE DELAY (NO FINAL DA PÁGINA)
       ========================= -->
  <script type="text/javascript">
    document.addEventListener("DOMContentLoaded", function() {
      // adicione as informações dos vídeos abaixo
      const vturbVideos = [
        {videoId: "ID_DO_VÍDEO_A", delayInSeconds: 60, utm: "utm_content=vslA"},
        {videoId: "ID_DO_VÍDEO_B", delayInSeconds: 60, utm: "utm_content=vslB"},
      ];

      const EXPIRATION_DAYS = 14;
      const CLASS_TO_DISPLAY = ".esconder";
      const elsHidden = document.querySelectorAll(CLASS_TO_DISPLAY);
      let elsDisplayed = false;
      let attempts = 0;

      class StorageHandler {
        static expiryTime = EXPIRATION_DAYS * 86400000;
        static set(key, value) {
          localStorage.setItem(
            key,
            JSON.stringify({ value, expiry: Date.now() + this.expiryTime })
          );
        }
        static get(key) {
          const item = localStorage.getItem(key);
          if (!item) return null;
          const { value, expiry } = JSON.parse(item);
          if (Date.now() > expiry) {
            localStorage.removeItem(key);
            return null;
          }
          return value;
        }
      }

      function getVideoSettings() {
        if (typeof smartplayer === 'undefined' || !(smartplayer.instances && smartplayer.instances.length)) {
          if (attempts >= 10) return null;
          attempts++;
          setTimeout(() => { startWatchVideoProgress(); }, 1000);
          return null;
        }
        const currentVideoId = smartplayer.instances[0].analytics.player.options.id;
        return vturbVideos.find(video => video.videoId === currentVideoId);
      }

      function showHiddenElements() {
        elsDisplayed = true;
        elsHidden.forEach(e => e.style.display = "block");
      }

      function startWatchVideoProgress() {
        const videoSettings = getVideoSettings();
        if (!videoSettings) return;

        const alreadyDisplayedKey = `alreadyElsDisplayed_${videoSettings.videoId}`;
        const alreadyElsDisplayed = StorageHandler.get(alreadyDisplayedKey);

        if (alreadyElsDisplayed) {
          showHiddenElements();
          return;
        }

        smartplayer.instances[0].on("timeupdate", () => {
          if (elsDisplayed || smartplayer.instances[0].smartAutoPlay) return;
          if (smartplayer.instances[0].video.currentTime < videoSettings.delayInSeconds) return;
          showHiddenElements();
          StorageHandler.set(alreadyDisplayedKey, true);
        });

        updateButtonUTMs(videoSettings.utm);
      }

      function updateButtonUTMs(utmParam) {
        const buttonLinks = document.querySelectorAll("a");
        const utmPrefix = window.location.search ? '&' : '?';
        const queryString = window.location.search.replace("utm_source=FB", "") + utmPrefix + utmParam;

        buttonLinks.forEach(buttonLink => {
          if (buttonLink.href.includes("#") || buttonLink.href.includes(utmParam)) return;
          buttonLink.href += buttonLink.href.includes('?') ? queryString.replace("?", "&") : queryString;
        });
      }

      startWatchVideoProgress();
    });
  </script>
