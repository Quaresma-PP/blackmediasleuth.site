<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link na Bio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="page">

    <!-- ══════════════════════════════
         HERO — imagem com dólares
    ══════════════════════════════ -->
    <section class="hero">

      <img src="images/hero.png" alt="Hero" class="hero__img">

      <!-- Gradiente suave que funde com o preto dos botões -->
      <div class="hero__fade"></div>

      <!-- Nome e cargo sobre o gradiente -->
      <div class="hero__text">
        <h1 class="hero__name">Filipe Santana</h1>
        <div class="hero__divider">
          <span></span><i class="fas fa-star"></i><span></span>
        </div>
        <p class="hero__role">Especialista em VSL</p>
        <p class="hero__bio">Crio funis de VSL que transformam desconhecidos em compradores — e escalam para 6 e 7 dígitos no automático.</p>
      </div>

    </section>

    <!-- ══════════════════════════════
         BOTÕES
    ══════════════════════════════ -->
    <section class="links">

      <a href="https://forms.gle/kXPxh2m6JChUCwvv5" target="_blank" rel="noopener" class="btn">
        <span class="btn__icon"><i class="fas fa-user-tie"></i></span>
        <span class="btn__label">MENTORIA INDIVIDUAL</span>
        <span class="btn__arrow"><i class="fas fa-angle-right"></i></span>
      </a>

      <a href="https://chat.whatsapp.com/FsWk1Hf3ugsJBzW2puj5ah" target="_blank" rel="noopener" class="btn">
        <span class="btn__icon"><i class="fab fa-whatsapp"></i></span>
        <span class="btn__label">LISTA DE ESPERA MCM</span>
        <span class="btn__arrow"><i class="fas fa-angle-right"></i></span>
      </a>

      <a href="https://www.youtube.com/@ofilipesantana" target="_blank" rel="noopener" class="btn btn--yt">
        <span class="btn__icon btn__icon--yt"><i class="fab fa-youtube"></i></span>
        <span class="btn__label">CANAL DO YOUTUBE</span>
        <span class="btn__arrow"><i class="fas fa-angle-right"></i></span>
      </a>

    </section>

  </main>

</body>
</html>
