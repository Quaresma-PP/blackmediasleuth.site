      (msg.avatar
        ? '<img class="msg-av" src="' + msg.avatar + '" alt="" loading="lazy" />'
        : '<span class="msg-av" style="background:var(--brand-red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">V</span>') +
      '<span class="msg-body">' +
        '<span class="msg-name' + (opts.owner ? " owner" : "") + '">' + esc(msg.name) + '</span>' +
        '<span class="msg-text">' + esc(msg.text) + '</span>' +
      '</span>';
    body.appendChild(el);

    while (body.children.length > MAX_DOM) body.removeChild(body.firstChild);
    if (stick) body.scrollTop = body.scrollHeight;
  }

  /* carga inicial: 6 mensagens já no chat */
  for (var i = 0; i < 6; i++) push(MESSAGES[next++ % MESSAGES.length]);
  body.scrollTop = body.scrollHeight;

  /* novas mensagens em intervalo irregular */
  (function tick() {
    var delay = 4000 + Math.random() * 6000;
    setTimeout(function () {
      push(MESSAGES[next++ % MESSAGES.length], { animate: true });
      total += 1;
      countEl.textContent = total;
      tick();
    }, delay);
  })();

  /* mensagem do próprio visitante */
  document.getElementById("chat-form").addEventListener("submit", function (e) {
    e.preventDefault();
    var input = document.getElementById("chat-input");
    var v = input.value.trim();
    if (!v) return;
    body.scrollTop = body.scrollHeight;
    push({ name: "Você", text: v, avatar: null }, { animate: true, owner: true });
    input.value = "";
    body.scrollTop = body.scrollHeight;
  });

  /* botões */
  var sub = document.getElementById("sub-btn");
  sub.addEventListener("click", function () {
    var on = sub.getAttribute("aria-pressed") === "true";
    sub.setAttribute("aria-pressed", on ? "false" : "true");
    sub.textContent = on ? "Inscrever-se" : "Inscrito";
  });

  var like = document.getElementById("like-btn");
  like.addEventListener("click", function () {
    like.classList.toggle("liked");
    document.getElementById("like-count").textContent =
      like.classList.contains("liked") ? "4,2 mil" : "4,2 mil";
  });

  document.getElementById("share-btn").addEventListener("click", function () {
    if (navigator.share) {
      navigator.share({ title: document.title, url: location.href }).catch(function () {});
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(location.href).catch(function () {});
    }
  });
})();
</script>
</body>
</html>
